<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Tracker - AI Assistant</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #6366f1;
        --secondary: #a855f7;
        --bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --text: #f8fafc;
        --text-dim: #94a3b8;
        --border: rgba(255, 255, 255, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background-color: var(--bg);
        background-image:
          radial-gradient(
            at 0% 0%,
            rgba(99, 102, 241, 0.15) 0,
            transparent 50%
          ),
          radial-gradient(
            at 100% 100%,
            rgba(168, 85, 247, 0.15) 0,
            transparent 50%
          );
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      header {
        padding: 1.5rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(10px);
        z-index: 10;
      }

      h1 {
        font-family: "Outfit", sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(to right, #818cf8, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .container {
        flex: 1;
        max-width: 1000px;
        margin: 0 auto;
        width: 100%;
        display: flex;
        flex-direction: column;
        padding: 1.5rem;
        position: relative;
      }

      #chat-window {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      .message {
        max-width: 80%;
        padding: 1rem 1.25rem;
        border-radius: 1.25rem;
        line-height: 1.6;
        font-size: 0.95rem;
        animation: fadeIn 0.3s ease-out;
      }

      .user-message {
        align-self: flex-end;
        background: var(--primary);
        color: white;
        border-bottom-right-radius: 0.25rem;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
      }

      .ai-message {
        align-self: flex-start;
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-bottom-left-radius: 0.25rem;
      }

      .input-area {
        padding: 1.5rem 0;
        display: flex;
        gap: 1rem;
        position: relative;
      }

      #user-input {
        flex: 1;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1rem 1.5rem;
        color: var(--text);
        font-size: 1rem;
        outline: none;
        transition: all 0.3s ease;
        backdrop-filter: blur(12px);
      }

      #user-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
      }

      button {
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white;
        border: none;
        border-radius: 1rem;
        padding: 0 1.5rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          opacity 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      button:hover {
        opacity: 0.9;
        transform: translateY(-2px);
      }

      button:active {
        transform: translateY(0);
      }

      .status {
        font-size: 0.8rem;
        color: var(--text-dim);
        text-align: center;
        margin-bottom: 0.5rem;
      }

      .btn-index {
        background: transparent;
        border: 1px solid var(--border);
        padding: 0.5rem 1rem;
        font-size: 0.8rem;
        border-radius: 0.5rem;
      }

      .typing {
        display: flex;
        gap: 4px;
        padding: 10px;
      }

      .dot {
        width: 6px;
        height: 6px;
        background: var(--text-dim);
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out;
      }

      .dot:nth-child(1) {
        animation-delay: -0.32s;
      }
      .dot:nth-child(2) {
        animation-delay: -0.16s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0);
        }
        40% {
          transform: scale(1);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      code {
        background: rgba(0, 0, 0, 0.3);
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        font-family: monospace;
      }

      pre {
        background: rgba(0, 0, 0, 0.3);
        padding: 1rem;
        border-radius: 8px;
        margin: 1rem 0;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Finance Tracker AI</h1>
      <button class="btn-index" onclick="reindex()">Re-index Documents</button>
    </header>

    <div class="container">
      <div id="chat-window">
        <div class="message ai-message">
          Hello! I can help you understand your financial data and how this
          application works. Ask me anything!
        </div>
      </div>

      <div class="status" id="status-text">Ready to help</div>

      <div class="input-area">
        <input
          type="text"
          id="user-input"
          placeholder="Ask about your finances or the code..."
          onkeypress="handleKeyPress(event)"
        />
        <button id="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>

    <script>
      const chatWindow = document.getElementById("chat-window");
      const userInput = document.getElementById("user-input");
      const statusText = document.getElementById("status-text");

      function appendMessage(role, text) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${role}-message`;

        // Basic markdown-like formatting for code
        text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
        text = text.replace(/```([\s\S]+?)```/g, "<pre><code>$1</code></pre>");
        text = text.replace(/\n/g, "<br>");

        msgDiv.innerHTML = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      function showTyping() {
        const typingDiv = document.createElement("div");
        typingDiv.className = "message ai-message typing-indicator";
        typingDiv.innerHTML =
          '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
        typingDiv.id = "typing-indicator";
        chatWindow.appendChild(typingDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      function removeTyping() {
        const indicator = document.getElementById("typing-indicator");
        if (indicator) indicator.remove();
      }

      async function sendMessage() {
        const query = userInput.value.trim();
        if (!query) return;

        appendMessage("user", query);
        userInput.value = "";
        showTyping();
        statusText.innerText = "Thinking...";

        try {
          const response = await fetch("/query", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: query }),
          });

          const data = await response.json();
          removeTyping();

          if (data.response) {
            appendMessage("ai", data.response);
            statusText.innerText = "Ready";
          } else {
            appendMessage(
              "ai",
              "Error: " + (data.error || "Something went wrong"),
            );
            statusText.innerText = "Error occurred";
          }
        } catch (error) {
          removeTyping();
          appendMessage(
            "ai",
            "Error reaching the server. Make sure the backend is running.",
          );
          statusText.innerText = "Connection error";
        }
      }

      async function reindex() {
        statusText.innerText = "Re-indexing...";
        try {
          const response = await fetch("/index", { method: "POST" });
          const data = await response.json();
          alert(data.message || data.error);
          statusText.innerText = "Ready";
        } catch (error) {
          alert("Error starting re-index.");
          statusText.innerText = "Error occurred";
        }
      }

      function handleKeyPress(e) {
        if (e.key === "Enter") sendMessage();
      }
    </script>
  </body>
</html>
